# This is a basic workflow to help you get started with Actions

name: phpcs

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
         fetch-depth: '0'
      - name: Setup PHP
        id: setup-php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: calendar, json, imagick, gd, zip, mbstring, intl, opcache, imap,
              mysql, pgsql, sqlite3, ldap, xml, mcrypt
          tools: php-parallel-lint/php-var-dump-check, parallel-lint, cs2pr, phpcs
      - name: Run PHPCS
        run: phpcs -q --report=checkstyle --standard=dev/setup/codesniffer/ruleset.xml --extensions=php --ignore=*/tx/*,*/vendor/*,dev/tools/phan/* . | cs2pr --graceful-warnings
      - name: Run VarDump Check
        run: var-dump-check --extensions php --tracy --exclude */vendor/* .
      - name: Run Parallel Lint
        run: parallel-lint --exclude einvoicing/vendor/ --exclude dev/tools/phan/stubs/ .
